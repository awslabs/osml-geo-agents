repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        args: ["--line-length=125"]
        types: [file, python]

  - repo: https://github.com/PyCQA/isort
    rev: 5.12.0
    hooks:
      - id: isort
        args: ["--line-length=125", "--profile=black"]
        types: [file, python]

  - repo: https://github.com/PyCQA/flake8
    rev: 7.2.0
    hooks:
      - id: flake8
        args: ["--ignore=E203,W503,W605", "--max-line-length=160"]
        types: [file, python]

  - repo: https://github.com/hhatto/autopep8
    rev: v2.3.2
    hooks:
      - id: autopep8
        args:
          [
            '--ignore=["E203","W503","W605"]',
            "--max-line-length=125",
            "--in-place"
          ]
        types: [file, python]

  - repo: https://github.com/aws-samples/automated-security-helper
    rev: '1.0.9-e-16May2023' # update with the latest tagged version in the repository
    hooks:
      - id: ash
        stages: [ manual ]
        # uncomment the line below if using "finch" on MacOS
        # args: [ "-f" ]

  - repo: https://github.com/sbrunner/pre-commit-copyright
    rev: 0.7.0
    hooks:
      - id: copyright
        name: update copyright
        exclude: |
          (?x)^(
            doc/.*|
            ^\..+|
            .+\.md|
            examples/.*|
            schemas/.*|
            test/data/.*|
            cdk/osml-geo-agents-config/.*|
            cdk/cdk\.json|
            cdk/cdk\.context\.json|
            cdk/\.gitignore|
            cdk/eslint\.config\.mjs|
            cdk/\.eslintrc\.js|
            cdk/jest\.config\.js|
            cdk/\.npmignore|
            cdk/\.prettierrc|
            cdk/\.prettierignore|
            cdk/tsconfig\.json|
            cdk/package\.json|
            cdk/package-lock\.json|
            cdk/bin/deployment/.*\.json\.example|
            LICENSE|
            NOTICE|
            py\.typed|
            pyproject\.toml|
            setup\.cfg|
            setup\.py|
            tox\.ini
          )$
      - id: copyright-required
        name: require copyright
        exclude: |
          (?x)^(
            doc/.*|
            ^\..+|
            .+\.md|
            examples/.*|
            schemas/.*|
            test/data/.*|
            cdk/osml-geo-agents-config/.*|
            cdk/cdk\.json|
            cdk/cdk\.context\.json|
            cdk/\.gitignore|
            cdk/eslint\.config\.mjs|
            cdk/\.eslintrc\.js|
            cdk/jest\.config\.js|
            cdk/\.npmignore|
            cdk/\.prettierrc|
            cdk/\.prettierignore|
            cdk/tsconfig\.json|
            cdk/package\.json|
            cdk/package-lock\.json|
            cdk/bin/deployment/.*\.json\.example|
            LICENSE|
            NOTICE|
            py\.typed|
            pyproject\.toml|
            setup\.cfg|
            setup\.py|
            tox\.ini
          )$

  - repo: local
    hooks:
      - id: npm-install
        name: Install npm dependencies
        entry: bash -c 'cd cdk && npm ci'
        language: system
        files: ^cdk/.*\.(ts|tsx|js|jsx|json)$
        pass_filenames: false

      - id: jest
        name: Jest Tests
        entry: bash -c 'cd cdk && npm run test'
        language: system
        files: ^cdk/.*\.(ts|tsx)$
        types: [ file ]
        pass_filenames: false

      - id: eslint
        name: ESLint
        entry: bash -c 'cd cdk && npx eslint . --ext .ts,.tsx --fix'
        language: system
        files: ^cdk/.*\.(ts|tsx)$
        types: [file]

      - id: prettier
        name: Prettier
        entry: bash -c 'cd cdk && npx prettier --write .'
        language: system
        files: ^cdk/.*\.(ts|tsx|js|jsx|json|yml|yaml|md)$
        types: [file]
