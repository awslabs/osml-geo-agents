services:
  osml-mcp-service:
    image: osml-geo-agents:latest
    build:
      context: ./
      dockerfile: ./docker/Dockerfile.mcp
    env_file:
      - .env
    entrypoint: ["conda", "run", "--no-capture-output", "-n", "osml_geo_agents"]
    command: ["python3.12", "-m", "aws.osml.geoagents.mcp.mcp_server_entrypoint"]
    environment:
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_SESSION_TOKEN
      - AWS_DEFAULT_REGION
      - WORKSPACE_LOCAL_CACHE
    volumes:
      - ${WORKSPACE_LOCAL_CACHE}:${WORKSPACE_LOCAL_CACHE}
    network_mode: host
    ports:
      - "8000:8000"
    platform: "linux/amd64"
